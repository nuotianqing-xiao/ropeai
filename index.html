<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rope AI 绳索智能助手</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="logo">Rope AI</div>
      <div class="subtitle">绳索结构 · 工艺 · 性能一体化智能助手</div>
    </header>

    <main class="main">
      <section class="intro">
        <h1>绳索智能助手</h1>
        <p>
          面向产业用纺织品、绳索结构设计、生产工艺分析、性能预测和知识图谱构建，
          提供专业的绳索领域问答与辅助设计服务。
        </p>

        <div class="cards">
          <div class="card">
            <h3>结构设计</h3>
            <p>支持绳索原料、股线、编织结构、组织规律等问题解答。</p>
          </div>

          <div class="card">
            <h3>工艺推荐</h3>
            <p>辅助分析加捻、编织、热定型、涂层和测试流程。</p>
          </div>

          <div class="card">
            <h3>性能分析</h3>
            <p>围绕强力、伸长率、耐磨、疲劳和应用场景进行专业解释。</p>
          </div>

          <div class="card">
            <h3>知识图谱</h3>
            <p>支持绳索领域实体、关系、属性和 RAG 知识库构建思路。</p>
          </div>
        </div>
      </section>

      <section class="chat-area">
        <div class="chat-title">点击右下角开始咨询</div>
        <div class="chat-placeholder">
          Rope AI 已接入 Coze 智能助手
        </div>
      </section>
    </main>
  </div>

  <!-- Coze Chat SDK -->
  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.20/libs/cn/index.js"></script>
  <script src="main.js"></script>
</body>
</html>
